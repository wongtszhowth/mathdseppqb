<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2200 DSE 數學題目庫</title>
    <script>
        window.MathJax = {
 tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, 
  output: {font: 'mathjax-termes' }
};
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; margin: 0; background: #f8f9fa; color: #333; }
        h1 { font-size: 1.5rem; text-align: center; margin: 10px 0; }
        .filter-container { position: sticky; top: 10px; z-index: 1000; background: rgba(255, 255, 255, 0.98); padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); backdrop-filter: blur(8px); margin-bottom: 25px; }
        .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .filter-body { transition: all 0.3s ease; }
        .filter-container.minimized .filter-body { display: none; }
        .filter-row { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        .filter-label { font-size: 14px; font-weight: bold; color: #555; margin-top: 5px; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; background: #fff; user-select: none; transition: all 0.2s; }
        .chip-base.active { background: #007aff; color: white; border-color: #007aff; }
        
        /* 三大範疇色彩 */
        .chip-algebra { background: #eef2ff; color: #35495e; border-color: #dee2e6; }
        .chip-algebra.active { background: #3b82f6; color: white; border-color: #2563eb; }
        .chip-geometry { background: #f0fdf4; color: #2d3748; border-color: #dee2e6; }
        .chip-geometry.active { background: #10b981; color: white; border-color: #059669; }
        .chip-data { background: #fff7ed; color: #4a5568; border-color: #dee2e6; }
        .chip-data.active { background: #f97316; color: white; border-color: #ea580c; }

        input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; margin-bottom: 15px; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
        .btn-toggle { background: #4a5568; color: white; }
        .btn-reset { background: #e0e0e0; color: #333; }
        
        #list { max-width: 800px; margin: 0 auto; padding-bottom: 50px; }
        .question-card { background: #fff; border: 1px solid #e1e4e8; padding: 22px; margin: 15px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        
        /* 卡片頂部佈局 */
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 12px; }
        .q-id { font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, Courier, monospace; font-size: 14px; color: #666; font-weight: 600; margin: 0; }
        
        /* 難度標籤 */
        .diff-badge { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 12px; font-weight: bold; padding: 3px 10px; border-radius: 6px; letter-spacing: 0.5px; }
        .diff-lv1 { background: #e0f2fe; color: #0369a1; }
        .diff-lv2 { background: #fef3c7; color: #b45309; }
        .diff-lv3 { background: #fee2e2; color: #b91c1c; }

        .question-content, .detail-content { font-size: normal; letter-spacing: 5%; line-height: 1.7; margin: 15px 0; white-space: pre-wrap; }
        .q-img { display: block; max-width: 100%; height: auto; margin: 15px auto; border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }

/* 第一層分題容器 (a, b, c) */
    .q-line {
        display: flex;
        align-items: flex-start;
        width: 100%;
        box-sizing: border-box;
        margin-top: 5px;
        margin-bottom: 3px;
        font-family: serif;
    }

    /* 第二層分題容器 (i, ii, iii) -> 再凹入一點，並自動扣除縮進寬度防止溢出 */
    .q-line.q-level-2 {
        margin-left: 40px;
        width: calc(100% - 40px);
        font-family: serif;
    }

    /* 題號標籤 (例如 a, b, i, ii) */
    .q-label {
        flex-shrink: 0;
        width: 40px;
        font-family: serif;
    }

    /* 題目文字內容區 */
    .q-text-content {
        flex-grow: 1;
        min-width: 0;
        word-break: break-word;
        font-family: serif;
    }

    /* 分數標籤 -> 100% 貼齊最右邊 */
    .marks {
        float: right;
        padding-left: 10px;
        font-weight: normal; /* 可依喜好決定是否加粗 */
        letter-spacing: 0.1em;
    }

    /* 清除浮動，確保卡片高度計算正確 */
    .q-clearfix {
        clear: both;
    }
        details { margin-top: 10px; background: #f1f5f9; border-radius: 8px; overflow: hidden; }
        summary { padding: 12px; font-weight: bold; color: #475569; cursor: pointer; }
        .detail-content { padding: 15px; background: #fff; }
    </style>
</head>
<body>

    <h1>DSE 數學題目庫</h1>
    
    <div class="filter-container" id="filterContainer">
        <div class="filter-header">
            <button class="btn btn-toggle" id="toggleBtn" onclick="toggleFilter()">隱藏篩選器</button>
            <div><button class="btn btn-reset" onclick="resetFilters()">重設所有條件</button></div>
        </div>
        
        <div class="filter-body">
            <input type="text" id="keyword" placeholder="搜尋關鍵字、題號或輸入空白鍵顯示全部..." oninput="filterData()">

            <div class="filter-row">
                <span class="filter-label">基本資訊:</span>
                <div class="chip-group" id="baseGroup">
                    <button class="chip chip-base" data-group="level" data-value="Junior" onclick="toggleChip(this)">初中</button>
                    <button class="chip chip-base" data-group="level" data-value="Senior" onclick="toggleChip(this)">高中</button>
                    <span style="border-left:1px solid #ccc; margin:0 5px;"></span>
                    <button class="chip chip-base" data-group="type" data-value="P1" onclick="toggleChip(this)">卷一 (長題目)</button>
                    <button class="chip chip-base" data-group="type" data-value="P2" onclick="toggleChip(this)">卷二 (MC)</button>
                    <span style="border-left:1px solid #ccc; margin:0 5px;"></span>
                    <button class="chip chip-base" data-group="year" data-value="2025" onclick="toggleChip(this)">2025</button>
                    <button class="chip chip-base" data-group="year" data-value="2024" onclick="toggleChip(this)">2024</button>
                    <button class="chip chip-base" data-group="year" data-value="2023" onclick="toggleChip(this)">2023</button>
                </div>
            </div>

            <div class="filter-row">
                <span class="filter-label">數學範疇:</span>
                <div class="chip-group" id="domainGroup">
                    <button class="chip chip-algebra" data-value="Algebra" onclick="toggleChip(this)">數與代數</button>
                    <button class="chip chip-geometry" data-value="Geometry" onclick="toggleChip(this)">度量、圖形與空間</button>
                    <button class="chip chip-data" data-value="Data Handling" onclick="toggleChip(this)">數據處理</button>
                </div>
            </div>

            <div class="filter-row">
                <span class="filter-label">數學課題:</span>
                <div class="chip-group" id="topicGroup">
                    <button class="chip chip-algebra" data-value="Approximation and Errors" onclick="toggleChip(this)">近似與誤差</button>
                    <button class="chip chip-algebra" data-value="Estimation" onclick="toggleChip(this)">估算</button>
                    <button class="chip chip-algebra" data-value="Complex Numbers" onclick="toggleChip(this)">複數</button>
                    <button class="chip chip-algebra" data-value="Rates, Ratios and Proportions" onclick="toggleChip(this)">率、比及比例</button>
                    <button class="chip chip-algebra" data-value="Percentages" onclick="toggleChip(this)">百分法</button>
                    <button class="chip chip-algebra" data-value="Algebraic Expressions" onclick="toggleChip(this)">代數式</button>
                    <button class="chip chip-algebra" data-value="Laws of Indices" onclick="toggleChip(this)">指數律</button>
                    <button class="chip chip-algebra" data-value="Factorization" onclick="toggleChip(this)">因式分解</button>
                    <button class="chip chip-algebra" data-value="Change of Subject" onclick="toggleChip(this)">主項變換</button>
                    <button class="chip chip-algebra" data-value="Algebraic Fractions and Fractional Equations" onclick="toggleChip(this)">代數分式及分式方程</button>
                    <button class="chip chip-algebra" data-value="Linear Equations in Two Unknowns" onclick="toggleChip(this)">二元一次方程</button>
                    <button class="chip chip-algebra" data-value="Quadratic Equations in One Unknown" onclick="toggleChip(this)">一元二次方程</button>
                    <button class="chip chip-algebra" data-value="Polynomials" onclick="toggleChip(this)">多項式</button>
                    <button class="chip chip-algebra" data-value="H.C.F. and L.C.M." onclick="toggleChip(this)">最大公因式及最小公倍式</button>
                    <button class="chip chip-algebra" data-value="Functions and Graphs" onclick="toggleChip(this)">函數及其圖像</button>
                    <button class="chip chip-algebra" data-value="Exponential Functions and Logarithm Functions" onclick="toggleChip(this)">指數函數與對數函數</button>
                    <button class="chip chip-algebra" data-value="Linear Inequalities and Compound Inequalities" onclick="toggleChip(this)">一元一次不等式及複合不等式</button>
                    <button class="chip chip-algebra" data-value="Quadratic Inequalities in One Unknown" onclick="toggleChip(this)">一元二次不等式</button>
                    <button class="chip chip-algebra" data-value="Linear Inequalities in Two Unknowns" onclick="toggleChip(this)">二元一次不等式</button>
                    <button class="chip chip-algebra" data-value="Sequences" onclick="toggleChip(this)">數列</button>
                    <button class="chip chip-algebra" data-value="Variations" onclick="toggleChip(this)">變分</button>

                    <button class="chip chip-geometry" data-value="Areas and Volumes" onclick="toggleChip(this)">面積及體積</button>
                    <button class="chip chip-geometry" data-value="Plane Geometry" onclick="toggleChip(this)">平面幾何</button>
                    <button class="chip chip-geometry" data-value="Four Centres of a Triangle" onclick="toggleChip(this)">三角形的四心</button>
                    <button class="chip chip-geometry" data-value="Basic Properties of Circles" onclick="toggleChip(this)">圓的基本性質</button>
                    <button class="chip chip-geometry" data-value="Tangents of Circles" onclick="toggleChip(this)">圓的切線</button>
                    <button class="chip chip-geometry" data-value="Trigonometric Ratios" onclick="toggleChip(this)">三角比</button>
                    <button class="chip chip-geometry" data-value="Trigonometry (2D)" onclick="toggleChip(this)">三角學 (2D)</button>
                    <button class="chip chip-geometry" data-value="Trigonometry (3D)" onclick="toggleChip(this)">三角學 (3D)</button>
                    <button class="chip chip-geometry" data-value="Coordinate Geometry" onclick="toggleChip(this)">坐標幾何</button>
                    <button class="chip chip-geometry" data-value="Equations of Straight Lines" onclick="toggleChip(this)">直線方程</button>
                    <button class="chip chip-geometry" data-value="Equations of Circles" onclick="toggleChip(this)">圓方程</button>
                    <button class="chip chip-geometry" data-value="Loci" onclick="toggleChip(this)">軌跡</button>

                    <button class="chip chip-data" data-value="Statistical Graphs" onclick="toggleChip(this)">統計圖表</button>
                    <button class="chip chip-data" data-value="Measures of Central Tendency" onclick="toggleChip(this)">集中趨勢的量度</button>
                    <button class="chip chip-data" data-value="Measures of Dispersion" onclick="toggleChip(this)">離差的量度</button>
                    <button class="chip chip-data" data-value="Permutations and Combinations" onclick="toggleChip(this)">排列與組合</button>
                    <button class="chip chip-data" data-value="Probability" onclick="toggleChip(this)">概率</button>
                </div>
            </div>
        </div>
    </div>

    <div id="list"></div>

    <script src="data.js"></script>
    <script src="2024dsep1.js"></script>

    <script>
        function toggleChip(button) {
            button.classList.toggle('active');
            filterData();
        }

        function getBaseSelectedValues(groupName) {
            return Array.from(document.querySelectorAll(`#baseGroup .chip.active[data-group="${groupName}"]`)).map(chip => chip.getAttribute('data-value'));
        }

        function getSelectedValues(groupId) {
            return Array.from(document.querySelectorAll(`#${groupId} .chip.active`)).map(chip => chip.getAttribute('data-value'));
        }

        function getDifficultyBadge(diff) {
            if (diff === 1) return `<span class="diff-badge diff-lv1">Lv.2</span>`;
            if (diff === 2) return `<span class="diff-badge diff-lv2">Lv.3-4</span>`;
            if (diff === 3) return `<span class="diff-badge diff-lv3">Lv.5+</span>`;
            return '';
        }

        async function filterData() {
            const keyword = document.getElementById('keyword').value.toLowerCase();
            const selectedLevels = getBaseSelectedValues('level');
            const selectedYears = getBaseSelectedValues('year');
            const selectedTypes = getBaseSelectedValues('type');
            const selectedDomains = getSelectedValues('domainGroup');
            const selectedTopics = getSelectedValues('topicGroup');

            if (keyword === "" && selectedLevels.length === 0 && selectedYears.length === 0 && selectedTypes.length === 0 && selectedDomains.length === 0 && selectedTopics.length === 0) {
                document.getElementById('list').innerHTML = `<p style="text-align:center; color:#777; margin-top:50px; font-size:15px;">💡 請選擇上方篩選條件，或在搜尋框輸入關鍵字開始練習。</p>`;
                return;
            }

            if (typeof questions === 'undefined') return;

            const filtered = questions.filter(q => {
                const matchKeyword = q.content.toLowerCase().includes(keyword) || q.id.toLowerCase().includes(keyword);
                const matchLevel = selectedLevels.length === 0 || (Array.isArray(q.level) ? q.level.some(l => selectedLevels.includes(l)) : selectedLevels.includes(q.level));
                const matchYear = selectedYears.length === 0 || selectedYears.includes(q.year.toString());
                const matchType = selectedTypes.length === 0 || selectedTypes.includes(q.type);
                const matchDomain = selectedDomains.length === 0 || (Array.isArray(q.domain) ? q.domain.some(d => selectedDomains.includes(d)) : selectedDomains.includes(q.domain));
                const matchTopic = selectedTopics.length === 0 || (Array.isArray(q.topic) ? q.topic.some(t => selectedTopics.includes(t)) : selectedTopics.includes(q.topic));
                return matchKeyword && matchLevel && matchYear && matchType && matchDomain && matchTopic;
            });

            const list = document.getElementById('list');
            if(filtered.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#999; margin-top:50px;">沒有符合條件的題目。</p>`;
                return;
            }

            list.innerHTML = filtered.map(q => `
                <div class="question-card">
                    <div class="card-header">
                        <div class="q-id">${q.id}</div>
                        ${getDifficultyBadge(q.difficulty)}
                    </div>
                    <div class="question-content">${q.content}</div>
                    <details>
                        <summary>💡</summary>
                        <div class="detail-content">${q.hint}</div>
                    </details>
                    <details>
                        <summary>📝</summary>
                        <div class="detail-content">${q.solution}</div>
                    </details>
                </div>
            `).join('');

            if (window.MathJax && MathJax.typesetPromise) {
                await MathJax.typesetPromise();
            }
        }

        function resetFilters() {
            document.getElementById('keyword').value = "";
            document.querySelectorAll('.chip.active').forEach(chip => chip.classList.remove('active'));
            filterData();
        }

        function toggleFilter() {
            const container = document.getElementById('filterContainer');
            const btn = document.getElementById('toggleBtn');
            if (container.classList.contains('minimized')) {
                container.classList.remove('minimized');
                btn.innerText = "隱藏篩選器";
            } else {
                container.classList.add('minimized');
                btn.innerText = "顯示篩選器";
            }
        }

        filterData();
    </script>
</body>
</html>
